name: Release RC (TestPyPI)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish and verify (for example: 0.2.0rc1)"
        required: true
        type: string

jobs:
  build-artifacts:
    name: Build RC artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-artifacts
          path: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-24.04
    needs: [build-artifacts]
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist-artifacts
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false

  smoke-macos:
    name: Smoke install from TestPyPI (macOS)
    runs-on: macos-14
    needs: [publish-testpypi]
    env:
      PACKAGE_VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install from TestPyPI
        run: |
          python -m pip install --upgrade pip
          for i in {1..12}; do
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple \
              "mlx-spectro==${PACKAGE_VERSION}" && break
            if [ "$i" -eq 12 ]; then
              exit 1
            fi
            sleep 10
          done

      - name: Smoke test
        run: |
          python -c "
          import mlx.core as mx
          from mlx_spectro import SpectralTransform, make_window, resolve_fft_params, get_transform_mlx
          t = SpectralTransform(1024, 256)
          x = mx.zeros((1, 4096), dtype=mx.float32)
          z = t.stft(x, output_layout='bnf')
          y = t.istft(z, length=4096, input_layout='bnf')
          mx.eval(z, y)
          assert z.shape == (1, 17, 513), f'unexpected stft shape: {z.shape}'
          assert y.shape == (1, 4096), f'unexpected istft shape: {y.shape}'
          import mlx_spectro; print(f'mlx-spectro {mlx_spectro.__version__} smoke test passed')
          " 2>&1 | head -20
